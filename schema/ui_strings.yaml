ind_card_heading:
  ja: "機能的自立プロファイル (退院時)"
  en: "Functional-independence profile (at discharge)"
ind_card_intro:
  ja: "SCIM-III の各 ADL 項目について、退院時に人的介助なし (補助具・装具は可) で自立する較正済み確率。集計 SCIM スコアを「食事・排泄・歩行はできるようになるか」という具体的な行為へ翻訳する。"
  en: "Calibrated probability of functional independence (no human assistance; aids/devices allowed) in each SCIM-III ADL item at discharge - reframing the aggregate SCIM score into the concrete acts patients ask about (feeding, bladder, walking)."
ind_profile_heading:
  ja: "項目別 自立確率 (領域別)"
  en: "Per-item independence probability (by domain)"
ind_expected_count:
  ja: "自立が期待される動作数"
  en: "Expected independent functions"
ind_by_domain:
  ja: "領域別"
  en: "By domain"
ind_most_likely:
  ja: "最も自立しやすい"
  en: "Most likely independent"
ind_least_likely:
  ja: "最も自立が難しい (注目点)"
  en: "Least likely (focus)"
ind_achieved:
  ja: "実測: 自立"
  en: "Observed: independent"
ind_not_achieved:
  ja: "実測: 非自立"
  en: "Observed: not independent"
ind_prob_axis:
  ja: "自立確率"
  en: "Independence probability"
ind_base_rate:
  ja: "コホート基準率"
  en: "Cohort base rate"
ind_caption:
  ja: "18 個の SCIM-III ADL 項目ごとの較正済み二値ヘッド (患者群 5 分割 OOF + Platt 較正)。自立 = 当該項目の機能的自立しきい値以上 (補助具・装具は可、人的介助なし)。歩行 3 項目は車椅子自立を含まない歩行自立。呼吸は退院時ほぼ全員自立のため除外。"
  en: "18 calibrated per-item binary heads (grouped 5-fold OOF + Platt calibration). Independence = item score at/above its functional-independence threshold (aids/devices allowed, no human assistance); the 3 walking items mean ambulation (wheelchair-independence excluded). Respiration is excluded (near-universal at discharge)."
methods_independence_heading:
  ja: "機能的自立プロファイル (G7)"
  en: "Functional-independence profile (G7)"
methods_independence_def:
  ja: "退院時の集計 SCIM スコアを、SCIM-III の ADL 項目ごとの「機能的自立」確率へと分解する 18 個の較正済み二値ヘッド。各ヘッドは入院特徴のみから予測し、患者群 5 分割の OOF 予測で評価・Platt 較正する。"
  en: "Eighteen calibrated binary heads that decompose the aggregate discharge SCIM score into a per-SCIM-III-item probability of functional independence. Each head predicts from admission features alone, evaluated and Platt-calibrated on grouped 5-fold out-of-fold predictions."
methods_ind_scorecard_heading:
  ja: "項目別スコアカード (判別・較正)"
  en: "Per-item scorecard (discrimination & calibration)"
methods_ind_scorecard_caption:
  ja: "各項目の AUC と Brier スキルスコア (1 − Brier/基準分散)。全項目で AUC≈0.88–0.93、Brier は基準を大きく下回る。色は領域。"
  en: "AUC and Brier skill score (1 − Brier/baseline variance) per item. Every item reaches AUC≈0.88-0.93 with Brier well below baseline. Color = domain."
methods_ind_calibration_heading:
  ja: "信頼度曲線オーバーレイ (全 18 ヘッド)"
  en: "Reliability overlay (all 18 heads)"
methods_ind_calibration_caption:
  ja: "全項目の Platt 較正後曲線を対角線に重ねたもの。対角付近に集まり、各項目ヘッドが良好に較正されていることを示す。個別の生 vs 較正は下のドリルダウン参照。"
  en: "Every item's Platt-calibrated reliability curve overlaid against the diagonal. The near-diagonal bundle shows the heads are well calibrated; the raw-vs-calibrated detail per item is in the drilldown below."
methods_ind_shap_heading:
  ja: "項目別 寄与因子ヒートマップ (in-sample SHAP)"
  en: "Per-item driver heatmap (in-sample SHAP)"
methods_ind_shap_caption:
  ja: "各項目について、全体で重要な入院特徴の平均 |SHAP| を項目内で正規化した相対寄与度。運動スコア (TotalMotor/UEMS/LEMS) と年齢が領域ごとに異なる役割を持つ。記述的 (in-sample)。"
  en: "For each item, the mean |SHAP| of the globally most-important admission features, row-normalized to the relative driver pattern within the item. Motor scores (TotalMotor/UEMS/LEMS) and age play domain-specific roles. Descriptive (in-sample)."
methods_ind_landscape_heading:
  ja: "入院 AIS 別 自立率ランドスケープ"
  en: "Independence-rate landscape by admission AIS"
methods_ind_landscape_caption:
  ja: "入院 AIS グレード別の各項目の実測自立率。行ごとに左→右へ明るくなる (A→E で自立率が単調上昇) のが G7 の中核所見。屋外歩行は全グレードで最も低い。"
  en: "Observed independence rate per item by admission AIS grade. The left→right brightening of each row (independence rises monotonically A→E) is the core G7 finding; outdoor walking stays lowest throughout."
methods_ind_drilldown_heading:
  ja: "項目別ドリルダウン (信頼度 + 寄与因子)"
  en: "Per-item drilldown (reliability + drivers)"
methods_ind_drilldown_caption:
  ja: "項目を選択すると、生 vs Platt 較正の信頼度曲線と in-sample SHAP 寄与因子を表示。"
  en: "Select an item to see its raw-vs-Platt-calibrated reliability curve and in-sample SHAP drivers."
methods_ind_item_label:
  ja: "SCIM 項目"
  en: "SCIM item"
# --- G8 recovery topography map (per-ISNCSCI-segment functional-milestone atlas) ---
topo_card_heading:
  ja: "回復トポグラフィ地図 (退院時)"
  en: "Recovery topography map (at discharge)"
topo_card_intro:
  ja: "ISNCSCI の全 132 セグメント (運動 20 + 触覚 56 + 痛覚 56) について、退院時に機能的マイルストーンへ到達する較正済み確率。運動は P(MMT≧3 = 抗重力)、感覚は P(≧1 = 保護的感覚)。集計スコアに埋もれたセグメント別の回復地図を可視化する。"
  en: "Calibrated probability that each of the 132 ISNCSCI segments (20 motor + 56 light-touch + 56 pin-prick) reaches a functional milestone at discharge - motor P(grade ≥3 = antigravity), sensory P(grade ≥1 = protective sensation). A per-segment recovery map otherwise buried in the aggregate scores."
topo_atlas_heading:
  ja: "セグメント別 機能到達確率 (皮膚分節 + 筋分節)"
  en: "Per-segment milestone probability (dermatomes + myotomes)"
topo_prob_axis:
  ja: "到達確率"
  en: "P(milestone)"
topo_base_rate:
  ja: "コホート基準率"
  en: "Cohort base rate"
topo_adm_self:
  ja: "入院時グレード"
  en: "Admission grade"
topo_modality_motor:
  ja: "運動 (筋分節・抗重力)"
  en: "Motor (myotome · antigravity)"
topo_modality_light_touch:
  ja: "触覚 (皮膚分節・保護的感覚)"
  en: "Light touch (dermatome · protective)"
topo_modality_pin_prick:
  ja: "痛覚 (皮膚分節・保護的感覚)"
  en: "Pin prick (dermatome · protective)"
topo_modality_label:
  ja: "感覚モダリティ"
  en: "Sensory modality"
topo_side_left:
  ja: "左"
  en: "L"
topo_side_right:
  ja: "右"
  en: "R"
topo_achieved:
  ja: "実測: 到達"
  en: "Observed: reached"
topo_not_achieved:
  ja: "実測: 未到達"
  en: "Observed: not reached"
topo_expected_motor:
  ja: "抗重力到達が期待される筋数"
  en: "Expected antigravity muscles"
topo_expected_lt:
  ja: "触覚保持 (期待)"
  en: "Light-touch preserved (exp.)"
topo_expected_pp:
  ja: "痛覚保持 (期待)"
  en: "Pin-prick preserved (exp.)"
topo_strongest:
  ja: "最も到達しやすい運動分節"
  en: "Strongest motor segment"
topo_weakest:
  ja: "最も到達が難しい運動分節 (注目点)"
  en: "Weakest motor segment (focus)"
topo_caption:
  ja: "132 個の独立した較正済み二値ヘッド (運動 20 + 触覚 56 + 痛覚 56)。各ヘッドは 30 の入院特徴 + 当該分節自身の入院時グレード (adm_self — 支配的予測因子) から予測し、患者群 5 分割 OOF + Platt 較正。高位頚髄の天井分節 12 個は較正不能のため一定の基準率を表示。APS なし (二値では退化)。"
  en: "132 independent calibrated binary heads (20 motor + 56 light-touch + 56 pin-prick). Each predicts from the 30 admission features + the segment's own admission grade (adm_self - the dominant predictor), grouped 5-fold OOF + Platt calibration. The 12 high-cervical ceiling dermatomes are degenerate (constant base rate). No APS layer (binary sets degenerate)."
methods_topography_heading:
  ja: "回復トポグラフィ地図 (G8)"
  en: "Recovery topography map (G8)"
methods_topography_def:
  ja: "退院時の機能をセグメント別に分解する 132 個の較正済み二値ヘッド。各セグメント (運動 20 筋分節 + 触覚 56 + 痛覚 56 皮膚分節) について、入院特徴 + 当該分節自身の入院時グレードから機能的マイルストーン到達確率を予測。集計の運動・感覚スコアが 5 つの合計値へ畳み込む 132 列のセグメント別信号を活用する。"
  en: "132 calibrated binary heads decomposing discharge function by segment. For each segment (20 motor myotomes + 56 light-touch + 56 pin-prick dermatomes) it predicts the probability of reaching a functional milestone from admission features + that segment's own admission grade - mining the 132 per-segment signals the aggregate motor/sensory scores collapse into five totals."
methods_topo_atlas_heading:
  ja: "コホート回復トポグラフィ (実測基準率)"
  en: "Cohort recovery topography (observed base rate)"
methods_topo_atlas_caption:
  ja: "全コホートで各セグメントが退院時にマイルストーンへ到達した実測割合。皮膚分節シルエット (触覚/痛覚を切替) + 筋分節ラダー。回復は AIS グレードではなく損傷レベルに支配される (抗重力到達数は AIS で非単調)。"
  en: "Observed fraction of the whole cohort reaching each segment's milestone at discharge. Dermatome silhouette (toggle light touch / pin prick) + myotome ladder. Recovery is governed by injury level, not AIS grade (the antigravity count is non-monotone in admission AIS)."
methods_topo_scorecard_heading:
  ja: "セグメント別 判別性能 (モダリティ別分布)"
  en: "Per-segment discrimination (distribution by modality)"
methods_topo_scorecard_caption:
  ja: "モデル化された約 120 ヘッドの OOF AUC と Brier スキルの分布 (点 = 各セグメント)。全モダリティで AUC≈0.85–0.97 と良好に判別。退化した高位頚髄天井分節 12 個は除外。"
  en: "Distribution of OOF AUC and Brier skill across the ~120 modelable heads (points = individual segments). All modalities discriminate well (AUC≈0.85-0.97). The 12 degenerate high-cervical ceiling dermatomes are excluded."
methods_topo_calibration_heading:
  ja: "モダリティ別 信頼度曲線 (プール)"
  en: "Pooled reliability by modality"
methods_topo_calibration_caption:
  ja: "各モダリティの全セグメント OOF 予測をプールした Platt 較正後の信頼度曲線。対角付近に乗り、較正が良好であることを示す。較正 MAE ≈0.01。"
  en: "Platt-calibrated reliability curve pooling every segment's OOF predictions per modality. The near-diagonal fit shows good calibration (calibration MAE ≈0.01). Per-segment raw-vs-calibrated detail is in the drilldown."
methods_topo_drivers_heading:
  ja: "モダリティ別 寄与因子 (in-sample SHAP)"
  en: "Drivers by modality (in-sample SHAP)"
methods_topo_drivers_caption:
  ja: "モダリティごとの上位入院特徴の平均 |SHAP|。当該分節自身の入院時グレード (adm_self) が全モダリティで支配的で、次いで LEMS/TotalMotor/UEMS など全体的重症度。記述的 (in-sample)。"
  en: "Mean |SHAP| of the top admission features per modality. The segment's own admission grade (adm_self) dominates every modality, followed by global severity (LEMS/TotalMotor/UEMS). Descriptive (in-sample)."
methods_topo_drilldown_heading:
  ja: "セグメント別ドリルダウン (信頼度 + 寄与因子)"
  en: "Per-segment drilldown (reliability + drivers)"
methods_topo_drilldown_caption:
  ja: "セグメントを選択すると、生 vs Platt 較正の信頼度曲線と in-sample SHAP 寄与因子を表示。adm_self = 当該分節自身の入院時グレード。"
  en: "Select a segment to see its raw-vs-Platt-calibrated reliability curve and in-sample SHAP drivers. adm_self = that segment's own admission grade."
topo_sim_worksheet_heading:
  ja: "入院時 ISNCSCI ワークシート (セグメント別グレード)"
  en: "Admission ISNCSCI worksheet (per-segment grades)"
topo_sim_worksheet_note:
  ja: "セグメント別の入院時グレードを編集 (運動 0–5、感覚 0–2)。当該分節自身のグレードが最も支配的な予測因子。参照患者から初期値を読込めます。空欄は不明 (NaN) として扱われます。"
  en: "Edit each segment's admission grade (motor 0-5, sensory 0-2) - a segment's own grade is its most dominant predictor. Seed from a reference patient, or leave blanks (treated as unknown / NaN)."
topo_sim_seed:
  ja: "参照患者から読込"
  en: "Seed from reference"
topo_sim_clear:
  ja: "ワークシートを消去"
  en: "Clear worksheet"
ld_card_heading:
  ja: "神経学的高位の下降予測"
  en: "Neurological-level descent"
ld_card_intro:
  ja: "入院→退院での神経学的高位 (NLI と左右の運動・感覚レベル) の尾側への下降を予測する。各レベルの「下降」(Δ≥1 分節の尾側移動 = 改善) を較正済み確率で、下降幅 (順序) を最尤クラスと80%予測集合で示す。脊髄分節は吻側ほど重症で、尾側への移動が回復を表す。入院時の当該レベルが未測定/INT のものは適用外。"
  en: "Predicts the admission→discharge caudal descent of the neurological levels (NLI plus the bilateral motor and sensory levels). Each level's descent (≥1 segment caudal shift = improvement) is shown as a calibrated probability; the descent magnitude (ordinal) as its most-likely class and 80% prediction set. More rostral cord segments are more severe, so a caudal shift means recovery. Levels with a missing/INT admission value do not apply."
ld_descent_heading:
  ja: "レベル別 下降確率 (較正済み)"
  en: "Per-level descent probability (calibrated)"
ld_magnitude_heading:
  ja: "下降幅 (順序・最尤クラス + 80%集合)"
  en: "Descent magnitude (ordinal - most-likely class + 80% set)"
ld_observed_heading:
  ja: "この患者の実測レベル変化 (入院→退院)"
  en: "This patient's observed level change (admission→discharge)"
ld_need_level:
  ja: "入院時の神経学的レベル (NLI・運動・感覚) を少なくとも1つ入力すると下降予測が表示されます。"
  en: "Enter at least one admission level (NLI, motor, or sensory) to see the descent prediction."
ld_mag_caption:
  ja: "下降幅ヘッドは class_weight=balanced のため確率は較正されていない。較正済みの下降確率 (上) とは別物で、最尤クラスと APS 集合として解釈する。ヘッドはほぼ縮退 (APS≈3) しており判別力は乏しい。"
  en: "The magnitude head is class-weighted, so its scores are uncalibrated - distinct from the calibrated descent probabilities above; read it as the most-likely class and APS set. The head is near-degenerate (APS≈3) with little resolving power."
ld_caption:
  ja: "下降確率は患者単位5分割の OOF 予測で Platt 較正済み (二値・near-balanced)。下降幅は交差コンフォーマル APS (α=0.2)。診断・推論層であり、本番の退院時アウトカムモデルとは別。NLI 以外の判別力は限定的 (Methods 参照)。"
  en: "Descent probabilities are Platt-calibrated on grouped 5-fold OOF predictions (binary, near-balanced); the magnitude set is cross-conformal APS (α=0.2). Diagnostic + inference layer, distinct from the production discharge-outcome models. Discrimination beyond NLI is limited (see Methods)."
methods_ld_heading:
  ja: "神経学的高位の下降モデル (G10)"
  en: "Neurological-level descent modeling (G10)"
methods_ld_def:
  ja: "ISNCSCI の5つの神経学的高位 (NLI、左右の運動・感覚レベル) について、入院→退院の尾側下降を予測する。脊髄分節を順序符号化し (吻側 C1=0 …尾側 S45=28、INT=29 を天井)、Δ>0 を尾側下降 = 改善とする。入院時 INT/欠測は改善余地なしとして除外。レベルごとに2ヘッド: 下降 = 較正済み二値 P(Δ≥1)、下降幅 = 順序多クラス {0,+1,≥+2} (class_weight=balanced ゆえ較正なし)。小コホート向けに患者単位5分割の OOF 予測で全指標・Platt 較正・交差コンフォーマル APS (α=0.2) を計算し、最終ヘッドは全コホートで再学習。SHAP は記述的な院内重要度。診断・推論層で本番アーティファクトは不変。"
  en: "Models the admission→discharge caudal descent of the five ISNCSCI neurological levels (NLI, bilateral motor and sensory). Cord segments are ordinally encoded (rostral C1=0 … caudal S45=28, INT=29 as the ceiling) so that Δ>0 is a caudal descent = improvement. Admission INT/missing values are excluded (no room to improve). Each level carries two heads: descent = calibrated binary P(Δ≥1); magnitude = ordinal {0,+1,≥+2} (class-weighted, hence uncalibrated). For the small cohorts, grouped 5-fold OOF predictions drive every metric, the Platt calibrator, and a cross-conformal APS q (α=0.2); the final heads refit on the full cohort. SHAP drivers are descriptive in-sample. Diagnostic + inference layer - production artifacts unchanged."
methods_ld_scorecard_heading:
  ja: "レベル別 下降判別 (AUC)"
  en: "Per-level descent discrimination (AUC)"
methods_ld_scorecard_caption:
  ja: "OOF AUC をレベル別に示す。下降を確かに予測できるのは NLI のみ (≈0.73)。左右の運動・感覚レベルは ≈0.62 と偶然に近い天井で、患者単位の運用は NLI に限るべき。"
  en: "OOF AUC per level. Only NLI descent is reliably predictable (≈0.73); the bilateral motor/sensory heads sit near a ≈0.62 chance-adjacent ceiling, so per-patient use should be limited to NLI."
methods_ld_landscape_heading:
  ja: "レベル別 アウトカム構成 (記述統計)"
  en: "Per-level outcome composition (descriptive)"
methods_ld_landscape_caption:
  ja: "悪化 (Δ<0) / 不変 (Δ=0) / 下降 (Δ≥1) の割合と中央値 Δ。INT (完全回復) が平均 Δ を押し上げるため中央値で示す。無視できない悪化の割合は真の吻側移動ではなく脊髄レベル再評価のノイズを反映する。"
  en: "Share of deteriorate (Δ<0) / stable (Δ=0) / descent (Δ≥1) with the median Δ. The median is reported because INT (full recovery) inflates the mean. The non-trivial deterioration share reflects re-assessment noise in the cord level, not true rostral migration."
methods_ld_drilldown_heading:
  ja: "レベル別ドリルダウン (較正・寄与因子・下降幅・Δ分布)"
  en: "Per-level drilldown (calibration, drivers, magnitude, Δ)"
methods_ld_drilldown_caption:
  ja: "レベルを選択すると、下降ヘッドの生 vs Platt 較正の信頼度曲線と in-sample SHAP 寄与因子、下降幅ヘッドの混同行列、当該レベルの Δ 分布を表示。"
  en: "Select a level to see its descent head's raw-vs-Platt-calibrated reliability curve and in-sample SHAP drivers, the magnitude head's confusion matrix, and that level's Δ distribution."
diss_card_heading:
  ja: "神経-機能 乖離プロファイル"
  en: "Neuro-functional dissociation profile"
diss_card_intro:
  ja: "神経学的回復 (Δ ISNCSCI スコア) と機能的回復 (Δ SCIM) の「ずれ」を予測する。標準化対比 D = z(Δ機能) − z(Δ神経): D>0 は機能優位 (代償・適応で神経回復以上に自立を獲得)、D<0 は神経優位 (筋力回復が自立に転換できていない = 機能転換に注力すべき指標)。Δ神経×Δ機能の散布図上で、患者を★として配置 (横位置=予測 Δ神経、対角線=同等回復 D=0 からの上下のずれ=乖離) する。"
  en: "Predicts the mismatch between neurological recovery (Δ ISNCSCI score) and functional recovery (Δ SCIM). The standardized contrast D = z(Δfunction) − z(Δneuro): D>0 = functional over-achiever (independence regained through compensation/adaptation beyond neurological gain); D<0 = functional under-achiever (strength not yet translated into independence - a functional-translation flag). The patient is placed as a star on the Δneuro×Δfunction plane (x = predicted Δneuro; vertical offset from the equal-recovery D=0 diagonal = the dissociation)."
diss_landscape_heading:
  ja: "乖離マップ (Δ神経 × Δ機能)"
  en: "Dissociation map (Δneuro × Δfunction)"
diss_need_data:
  ja: "入院時の運動・SCIM スコアを入力すると乖離予測が表示されます。"
  en: "Enter admission motor / SCIM scores to see the dissociation prediction."
diss_headline:
  ja: "最も乖離する軸"
  en: "Most dissociated axis"
diss_caption:
  ja: "方向 (機能優位 P(D>0)) は患者単位5分割の OOF 予測で Platt 較正済み・near-balanced。大きさ D は連続回帰 + 周辺交差コンフォーマル80%予測区間 (重み付けなしのため二値の方向と整合)。点数は sd_f·D で機能スコア換算。診断・推論層で本番アウトカムモデルとは別。予測 D は2軸を個別予測して差し引いた値とほぼ等価 (r≈0.97) であり、新規性は単一の符号付き乖離信号という提示面にある。"
  en: "Direction (P(over-achiever) = P(D>0)) is Platt-calibrated on grouped 5-fold OOF predictions (near-balanced); the magnitude D is a continuous regression + a marginal cross-conformal 80% PI (unweighted, so it agrees with the binary direction). Points are D back-translated to functional-score units via sd_f·D. Diagnostic + inference layer, distinct from the production outcome models. Predicted D is near-equivalent (r≈0.97) to differencing two separately-modeled axes - the novelty is the single signed dissociation signal, framing-side."
methods_diss_heading:
  ja: "神経-機能 乖離モデル (G11)"
  en: "Neuro-functional dissociation modeling (G11)"
methods_diss_def:
  ja: "SCI の回復は神経学的軸 (運動・感覚スコアの増分) と機能的軸 (ADL 自立の増分) に分かれ、両者は弱くしか連関しない (Pearson r≈0.12–0.27、約41–45%が乖離象限) ため、試験では別々に報告される。本モデルは入院時特徴量からその乖離 D = z(Δ機能) − z(Δ神経) を予測する。連関が弱いため残差ではなく標準化対比を用いる (残差は機能軸そのものに退化する)。ドメイン対の3軸 (UEMS↔セルフケア、LEMS↔移動、運動合計↔SCIM合計)、各2ヘッド: 機能優位 = 較正済み二値 P(D>0)、大きさ = D の連続回帰 + 周辺コンフォーマル80%区間。小コホート向けに患者単位5分割の OOF で全指標・Platt・コンフォーマル q を計算し全コホートで再学習、SHAP は記述的院内重要度。本番アーティファクトは不変。"
  en: "SCI recovery splits into a neurological axis (motor/sensory score gain) and a functional axis (ADL-independence gain) that are only weakly coupled (Pearson r≈0.12-0.27; ~41-45% of episodes off-diagonal), so trials report them separately. This model predicts the dissociation D = z(Δfunction) − z(Δneuro) from admission features. Because the coupling is weak, a standardized contrast - not a residual - is used (a residual would collapse onto the functional axis itself). Three domain-paired axes (UEMS↔self-care, LEMS↔mobility, total-motor↔SCIM-total), each with two heads: over_achiever = calibrated binary P(D>0); magnitude = continuous regression on D + a marginal conformal 80% PI. For the small cohorts, grouped 5-fold OOF predictions drive every metric, the Platt calibrator and the conformal q; the heads refit on the full cohort; SHAP drivers are descriptive in-sample. Production artifacts unchanged."
methods_diss_landscape_heading:
  ja: "コホート乖離マップ (軸別)"
  en: "Cohort dissociation map (per axis)"
methods_diss_landscape_caption:
  ja: "各軸の Δ神経×Δ機能 散布図。破線は同等回復の対角線 (D=0 = 機能優位/神経優位の境界)、点線はコホート回帰直線 (傾きが対角線より緩い = 機能は神経回復に追従しないという視覚的証拠)。点はティール=機能優位 / クリムゾン=神経優位。"
  en: "Per-axis Δneuro×Δfunction scatter. The dashed line is the equal-recovery diagonal (D=0 - the over/under boundary); the dotted line is the cohort regression (shallower than the diagonal - the visual proof that function does not keep pace with neurological recovery). Points are teal = over-achiever / crimson = under-achiever."
methods_diss_scorecard_heading:
  ja: "軸別 予測性能 (方向 AUC・大きさ R²)"
  en: "Per-axis predictability (direction AUC, magnitude R²)"
methods_diss_scorecard_caption:
  ja: "入院時特徴量からの予測性能。3軸とも良好 (機能優位 AUC 0.93–0.95、大きさ R² 0.69–0.76)。最大寄与因子は常に神経軸のベースラインスコア (天井/伸び代)、次いで年齢 (代償能力)。"
  en: "How well admission features predict the dissociation. All three axes are well-predicted (over-achiever AUC 0.93-0.95; magnitude R² 0.69-0.76). The top driver is always the neuro-axis baseline score (ceiling/room), with age second (compensation capacity)."
methods_diss_drilldown_heading:
  ja: "軸別ドリルダウン (機能優位ヘッドの較正・寄与因子)"
  en: "Per-axis drilldown (over-achiever head: calibration + drivers)"
methods_diss_drilldown_caption:
  ja: "軸を選択すると、機能優位 (二値) ヘッドの生 vs Platt 較正の信頼度曲線と in-sample SHAP 寄与因子を表示。"
  en: "Select an axis to see its over-achiever (binary) head's raw-vs-Platt-calibrated reliability curve and in-sample SHAP drivers."
