# --- methods ---
methods_outcome:
  ja: "主要アウトカム"
  en: "Primary outcome"
methods_outcome_def:
  ja: "退院時 SCIM-III 合計スコア (0–100)。値が高いほど ADL 自立度が高いことを示す。"
  en: "Discharge SCIM-III total score (0-100). Higher = more ADL independence."
methods_model:
  ja: "モデル"
  en: "Model"
methods_model_def:
  ja: "Gradient Boosted Trees (LightGBM)。クォンタイル回帰により 10%/50%/90% 予測区間を出力。"
  en: "Gradient Boosted Trees (LightGBM) with quantile heads at 10/50/90% for prediction intervals."
methods_features:
  ja: "特徴量"
  en: "Features"
methods_features_def:
  ja: "入院時 (0day) のみで取得される変数: 人口統計、損傷分類、AIS、NLI、UEMS/LEMS、感覚総和、ZPP、VAC/DAP、合併症 (糖尿病・OPLL・DISH)。"
  en: "Admission-only (day 0) variables: demographics, injury classification, AIS, NLI, UEMS/LEMS, sensory totals, ZPP, VAC/DAP, comorbidities (diabetes, OPLL, DISH)."
methods_split:
  ja: "データ分割"
  en: "Train / test split"
methods_split_def:
  ja: "患者単位のグループ分割: 80% 学習・20% テスト。クロスバリデーション (5-fold, GroupKFold)。"
  en: "Patient-level group split: 80% train / 20% test. 5-fold GroupKFold cross-validation."
methods_explainability:
  ja: "説明可能性"
  en: "Explainability"
methods_explainability_def:
  ja: "TreeSHAP によるグローバル・ローカル説明。連続量にはパーシャル依存も併用。"
  en: "TreeSHAP for global & local explanations; partial dependence for continuous features."
methods_subgroup:
  ja: "サブグループ解析"
  en: "Subgroup analysis"
methods_subgroup_def:
  ja: "Mann-Whitney U / Kruskal-Wallis H 検定と効果量 (Cliff's δ / Cohen's d)。FDR 補正済み。"
  en: "Mann-Whitney U / Kruskal-Wallis H tests with effect sizes (Cliff's δ / Cohen's d); FDR-adjusted."

