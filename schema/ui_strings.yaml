  ja: "予測クラス"
  en: "Predicted class"
methods_per_outcome_heading:
  ja: "アウトカム別性能"
  en: "Per-outcome performance"
methods_trajectory_heading:
  ja: "回復軌道予測モデル (SCIM-III 各時点)"
  en: "Recovery trajectory models (SCIM-III per timepoint)"
methods_dataquality_heading:
  ja: "データ品質・整合性レポート"
  en: "Data quality & consistency report"
methods_dataquality_def:
  ja: "ローダーが欠損値に変換して隠してしまう入力エラーや臨床的矛盾を抽出する診断レポート。検出区分は、領域 (範囲外の数値・未定義カテゴリ)、項目間 (AIS↔仙髄温存・NLI 整合性など)、経時 (同一症例の時点間での悪化・大幅低下)。モデル学習には使用せず、データ確認用。"
  en: "Diagnostic report surfacing data-entry errors and clinical inconsistencies that the defensive loader would otherwise mask as missing values. Categories: domain (out-of-range numbers, undefined categories), cross-field (clinical consistency such as AIS ↔ sacral sparing and NLI), and longitudinal (deterioration / large drops across an episode's timepoints). For data review only — not used in model training."
methods_temporal_heading:
  ja: "時間的検証 (期間外)"
  en: "Temporal validation (out-of-time)"
methods_temporal_def:
  ja: "業務年度 (2014–2025) に基づく期間外評価。各テスト年 T について、それ以前の全年で学習し T 年のみで評価する拡張窓ローリングオリジン方式 (患者単位で分割を保持)。ランダムな患者分割では見えない経年ドリフトを測定する。左軸=点予測精度 (回帰: R²、AIS: 正解率) と基準 (ランダム分割) 線、右軸=80% 区間/APS カバレッジ と名目 80% 線。診断用であり、本番モデルは変更しない。"
  en: "Out-of-time evaluation keyed on business year (2014–2025). For each test year T the model trains on all prior years and is tested on year T alone (expanding-window rolling origin, group-safe by patient). This measures the calendar drift the random patient split cannot see. Left axis = point accuracy (R² for regression, accuracy for AIS) with the random-split baseline line; right axis = 80% PI / APS coverage with the nominal-80% line. Diagnostic only — the production model is unchanged."
methods_landmark_heading:
  ja: "ランドマーク (動的) 予測 — 観測の価値"
  en: "Landmark (dynamic) prediction — value of observation"
methods_landmark_def:
  ja: "退院時アウトカムを、入院時特徴に加えて各ランドマーク時点 (72h・2w・4w・6w・2m・3m) までに観測された臨床指標 (SCIM 合計/下位尺度・AIS・運動/感覚スコアの直近値) から予測する。ランドマークが進み実際の初期回復が観測されるほど、点予測精度は上がり予測区間は狭まる。これが「観測の価値」である。各ランドマークでは、その時点で在院中の症例 (リスク集合) のみを対象とし、同一集合・同一分割で入院時のみ基準モデルも学習することで、集合の縮小を補正した観測の正味価値を分離する。診断・推論層であり、本番モデルは変更しない。"
  en: "Predict the discharge outcome from the admission features plus the clinical measures observed by each landmark time (72 h, 2 w, 4 w, 6 w, 2 m, 3 m) — the most-recent SCIM total / subscales, AIS grade, and motor / sensory scores. As the landmark advances and real early recovery is observed, point accuracy rises and the prediction interval narrows: the value of observation. Each landmark uses only the still-admitted episodes at that time (the risk set), and an admission-only baseline is fit on the same set and split, isolating the net value of the observed scores after correcting for the shrinking cohort. Diagnostic + inference layer — the production model is unchanged."
