  - { display: "CF-5", ja: "CF-5 圧迫屈曲 5度", en: "CF-5 Compressive flexion, stage 5" }
  - { display: "DF-1", ja: "DF-1 牽引屈曲 1度", en: "DF-1 Distractive flexion, stage 1" }
  - { display: "DF-2", ja: "DF-2 牽引屈曲 2度", en: "DF-2 Distractive flexion, stage 2" }
  - { display: "DF-3", ja: "DF-3 牽引屈曲 3度", en: "DF-3 Distractive flexion, stage 3" }
  - { display: "DF-4", ja: "DF-4 牽引屈曲 4度", en: "DF-4 Distractive flexion, stage 4" }
  - { display: "CE-1", ja: "CE-1 圧迫伸展 1度", en: "CE-1 Compressive extension, stage 1" }
  - { display: "CE-2", ja: "CE-2 圧迫伸展 2度", en: "CE-2 Compressive extension, stage 2" }
  - { display: "CE-3", ja: "CE-3 圧迫伸展 3度", en: "CE-3 Compressive extension, stage 3" }
  - { display: "CE-4", ja: "CE-4 圧迫伸展 4度", en: "CE-4 Compressive extension, stage 4" }
  - { display: "CE-5", ja: "CE-5 圧迫伸展 5度", en: "CE-5 Compressive extension, stage 5" }
  - { display: "DE-1", ja: "DE-1 牽引伸展 1度", en: "DE-1 Distractive extension, stage 1" }
  - { display: "DE-2", ja: "DE-2 牽引伸展 2度", en: "DE-2 Distractive extension, stage 2" }
