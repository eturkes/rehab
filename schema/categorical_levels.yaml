  - { display: "LF-2", ja: "LF-2 側屈 2度",    en: "LF-2 Lateral flexion, stage 2" }
  - { display: "OTHER", ja: "その他",          en: "Other",                              raw_aliases: ["その他"] }
  - { display: "UNCL",  ja: "分類不能",        en: "Unclassifiable",                     raw_aliases: ["分類不能", "不明"] }

# Bone-injury level — open-ended (C1..S5, plus paired "C3/4", "L1", "non-bony", etc.).
# Keep canonical = raw token; loader normalizes spaces; uses cord_level map for paired-level display.
bony_level:
  - { display: "NONBONY", ja: "非骨傷性", en: "Non-bony",  raw_aliases: ["非骨傷性"] }
  - { display: "UNK",     ja: "不明",     en: "Unknown",   raw_aliases: ["不明", "0"] }

