  - { display: "TRAFFIC",    ja: "交通事故",                 en: "Traffic accident",                raw_aliases: ["交通事故"] }
  - { display: "SPORT",      ja: "スポーツ",                 en: "Sports",                          raw_aliases: ["スポーツ"] }
  - { display: "HEAVY",      ja: "重量物の落下／下敷き",     en: "Heavy object — fall / crush",     raw_aliases: ["重量物の落下あるいは下敷き", "重量物の落下", "重量物下敷き", "重量物落下・下敷き"] }
  - { display: "TUMOR_SURG", ja: "脊髄腫瘍術後",            en: "Post tumor surgery",              raw_aliases: ["脊髄腫瘍ope後"] }
  - { display: "DF-4",       ja: "DF-4 (不明)",              en: "DF-4 (unspecified)",              raw_aliases: [] }
