  - { display: "CF-1", ja: "CF-1 圧迫屈曲 1度", en: "CF-1 Compressive flexion, stage 1" }
  - { display: "CF-2", ja: "CF-2 圧迫屈曲 2度", en: "CF-2 Compressive flexion, stage 2" }
