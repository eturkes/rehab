# Bilingual factor-level translations.
# `display`: canonical key used internally after `normalize_level` cleans the raw value.
# `ja` / `en`: human-readable labels.
# `raw_aliases`: any raw strings (as they appear in the CSV) that should normalize to this `display`.
#   Use this to absorb typos, leftover Excel artifacts (FALSE for 0), and slash/space variants.

version: 1

sex:
  - { display: "M", ja: "男性", en: "Male",    raw_aliases: ["男"] }
  - { display: "F", ja: "女性", en: "Female",  raw_aliases: ["女"] }

yesno_ja:
  - { display: "Y",  ja: "有り", en: "Yes",  raw_aliases: ["有", "あり", "有り"] }
  - { display: "N",  ja: "無し", en: "No",   raw_aliases: ["無", "なし", "無し"] }

yn_yes_no:
  - { display: "Y",  ja: "あり",   en: "Yes",          raw_aliases: ["Y", "YS", "TES"] }
  - { display: "N",  ja: "なし",   en: "No",           raw_aliases: ["N"] }
  - { display: "NT", ja: "検査不能", en: "Not testable", raw_aliases: ["NT", "測定不可"] }

traumatic:
  - { display: "TRA",  ja: "外傷性",   en: "Traumatic",       raw_aliases: ["外傷性"] }
  - { display: "NTRA", ja: "非外傷性", en: "Non-traumatic",   raw_aliases: ["非外傷性"] }
  - { display: "NOMP", ja: "麻痺なし", en: "No paralysis",    raw_aliases: ["麻痺無", "麻痺なし"] }

para_tetra:
  - { display: "TETRA", ja: "四肢麻痺", en: "Tetraplegia",       raw_aliases: ["四肢麻痺"] }
  - { display: "PARA",  ja: "対麻痺",   en: "Paraplegia",        raw_aliases: ["対麻痺"] }
  - { display: "NONE",  ja: "麻痺なし", en: "No paralysis",      raw_aliases: ["麻痺無", "麻痺なし"] }

comp_incomp:
  - { display: "C",  ja: "完全損傷", en: "Complete",   raw_aliases: ["C"] }
  - { display: "I",  ja: "不全損傷", en: "Incomplete", raw_aliases: ["I"] }

ais:
  - { display: "A",  ja: "AIS A (完全)",     en: "AIS A (Complete)",                    raw_aliases: ["A"] }
  - { display: "B",  ja: "AIS B (感覚不全)", en: "AIS B (Sensory incomplete)",           raw_aliases: ["B"] }
  - { display: "C",  ja: "AIS C (運動不全)", en: "AIS C (Motor incomplete, <half ≥3)",   raw_aliases: ["C"] }
  - { display: "D",  ja: "AIS D (運動不全)", en: "AIS D (Motor incomplete, ≥half ≥3)",   raw_aliases: ["D", "D0", "D ", "d"] }
  - { display: "E",  ja: "AIS E (正常)",     en: "AIS E (Normal)",                       raw_aliases: ["E"] }
  - { display: "ND", ja: "判定不能",         en: "Not determinable",                     raw_aliases: ["ND", "NT"] }

# Modified Frankel grade — the column packs mFrankel/Frankel as a pair.
# Per Frankel: A,B,C,D,E. Per modified Frankel: A,B1,B2,B3,C1,C2,D0,D1,D2,D3,E.
# We surface the *modified Frankel* (first token) as canonical since it's more granular.
mfrankel_pair:
  - { display: "A",   ja: "A: 完全麻痺",              en: "A: Complete",                                  raw_aliases: ["A/A", "A"] }
  - { display: "B1",  ja: "B1: 感覚残存 (運動なし)",   en: "B1: Sensory only — no motor",                 raw_aliases: ["B1/B1", "B1"] }
  - { display: "B2",  ja: "B2: 感覚残存 (非機能的)",   en: "B2: Sensory only — non-functional motor",     raw_aliases: ["B2/B2", "B2"] }
  - { display: "B3",  ja: "B3: 感覚残存 (機能的)",     en: "B3: Sensory only — functional motor",         raw_aliases: ["B3/B3", "B3"] }
  - { display: "B",   ja: "B: 感覚残存",              en: "B: Sensory incomplete",                       raw_aliases: ["B/B", "B"] }
  - { display: "C1",  ja: "C1: 運動残存 (非機能的)",   en: "C1: Motor — non-functional",                  raw_aliases: ["C1/C1", "C1"] }
  - { display: "C2",  ja: "C2: 運動残存 (中等度)",     en: "C2: Motor — intermediate function",           raw_aliases: ["C2/C2", "C2"] }
  - { display: "C",   ja: "C: 運動残存",              en: "C: Motor incomplete",                          raw_aliases: ["C/C", "C"] }
  - { display: "D0",  ja: "D0: 歩行可能 (制限あり)",   en: "D0: Walks with limitation",                   raw_aliases: ["D0/D0", "D0"] }
  - { display: "D1",  ja: "D1: 屋内歩行可能",          en: "D1: Indoor ambulation",                       raw_aliases: ["D1/D1", "D1"] }
  - { display: "D2",  ja: "D2: 屋外歩行 (補助あり)",   en: "D2: Outdoor ambulation, with aids",           raw_aliases: ["D2/D2", "D2"] }
  - { display: "D3",  ja: "D3: 屋外歩行 (自立)",       en: "D3: Outdoor ambulation, independent",         raw_aliases: ["D3/D3", "D3"] }
  - { display: "D",   ja: "D: 運動回復 (歩行可)",     en: "D: Motor incomplete, ambulatory",              raw_aliases: ["D/D", "D"] }
  - { display: "E",   ja: "E: 正常",                  en: "E: Normal",                                    raw_aliases: ["E/E", "E"] }

