# Serena project config. Omitted keys fall back to Serena defaults / global serena_config.yml.
# Full key reference: https://oraios.github.io/serena/02-usage/050_configuration.html
project_name: "rehab"

# Language servers to start (first = default/fallback). For C use cpp, JS use typescript.
languages:
- python

encoding: "utf-8"

# Honor .gitignore, so every gitignored do-not-read path is skipped without an entry below.
ignore_all_files_in_gitignore: true

# do-not-read sync (AGENTS.md): list ONLY the non-gitignored deny-Read() targets from
# .claude/settings.json — tracked files not worth an agent's tokens. Keep in lockstep with
# those deny rules for every TRACKED entry; gitignored targets are already covered above.
ignored_paths:
- "/uv.lock"
- "/models/subgroups.json"
